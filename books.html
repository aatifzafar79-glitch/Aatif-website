<!DOCTYPE html>
<html>
<head>
  <title>Books - Aatif Book Store</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
    }

    .header {
      background: linear-gradient(to right, #2193b0, #6dd5ed);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .books-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .book-card {
      background: white;
      width: 250px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }

    .book-card:hover {
      transform: scale(1.05);
    }

    .book-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 5px;
    }

    .book-card h3 {
      margin: 10px 0;
    }

    .book-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .book-card a:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>📚 Our Books Collection</h1>
  <p>Download and explore study materials</p>
</div>

<div class="books-container">

  <!-- BOOK 1 -->
  <div class="book-card">
    <img src="https://via.placeholder.com/250x150">
    <h3>Math Book</h3>
    <p>Class 10 Full Guide</p>
    <a href="books/book1.pdf" download>Download PDF</a>
  </div>

  <!-- BOOK 2 -->
  <div class="book-card">
    <img src="https://via.placeholder.com/250x150">
    <h3>Science Book</h3>
    <p>Easy Notes</p>
    <a href="books/book2.pdf" download>Download PDF</a>
  </div>

  <!-- BOOK 3 -->
  <div class="book-card">
    <img src="https://via.placeholder.com/250x150">
    <h3>English Book</h3>
    <p>Grammar & Writing</p>
    <a href="books/book3.pdf" download>Download PDF</a>
  </div>

</div>

</body>
</html>
